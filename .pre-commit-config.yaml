# ============================================
# Pre-commit Hooks for FortiGate Backup
# ============================================
# Install with: pre-commit install
# Run on all files: pre-commit run --all-files
# ============================================

repos:
  # General hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=10240']
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: check-case-conflict

  # Secrets scanning
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: |
          (?x)^(
            ansible/vault/.*|
            .*\.pem|
            .*\.key|
            .*vault.*
          )$

  # Ansible hooks
  - repo: https://github.com/ansible/ansible-lint
    rev: v6.22.1
    hooks:
      - id: ansible-lint
        files: \.(yaml|yml)$
        args:
          - -x
          - '106|204|208|305|306|403|502'

  # YAML linting
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.33.0
    hooks:
      - id: yamllint
        args: ['-d', '{extends: relaxed, rules: {line-length: {max: 200}}}']

  # Shell script linting
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.9.0.5
    hooks:
      - id: shellcheck
        args: ['--severity=warning']
        files: \.sh$

  # Python hooks
  - repo: https://github.com/PyCQA/flake8
    rev: 6.1.0
    hooks:
      - id: flake8
        args: ['--max-line-length=120', '--extend-ignore=E203,W503']
        additional_dependencies: [flake8-docstrings]

  # Python type checking
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.7.0
    hooks:
      - id: mypy
        args: ['--ignore-missing-imports', '--disallow-untyped-defs']
        additional_dependencies: [types-pyyaml, types-requests]

  # Markdown linting
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.37.0
    hooks:
      - id: markdownlint
        args: ['--disable', 'MD013', 'MD033']

  # Custom FortiGate secrets scanner
  - repo: local
    hooks:
      - id: fortigate-secrets-scan
        name: FortiGate Secrets Scanner
        entry: python3 scripts/python/secrets_scanner.py
        language: system
        args: ['--file']
        files: \.(conf|json|txt|yml|yaml)$
        pass_filenames: true

  # FortiGate backup validation
  - repo: local
    hooks:
      - id: validate-ansible-playbooks
        name: Validate Ansible Playbooks
        entry: ansible-playbook
        language: system
        args: ['--syntax-check']
        files: ^ansible/playbooks/.*\.yml$
        pass_filenames: true
