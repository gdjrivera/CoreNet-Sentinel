# ============================================
# Ansible Configuration - FortiGate Backup
# ============================================
# Cross-platform: Linux native + WSL2
# ============================================

[defaults]
# Inventory
inventory = inventory/production/hosts.yml

# Host key checking (relaxed in WSL2 due to path differences)
host_key_checking = True

# Performance tuning
forks = 50
timeout = 60
gathering = explicit
strategy = linear

# Output
stdout_callback = yaml
bin_ansible_callbacks = True
callback_whitelist = profile_tasks, timer, mail
command_warnings = False
nocows = 1

# Retry files
retry_files_enabled = False

# Paths (platform-aware using Jinja2)
local_tmp = /tmp/ansible-${USER}

# Fact caching (optional: use redis for multi-node AWX)
fact_caching = memory
fact_caching_timeout = 3600

[inventory]
enable_plugins = host_list, script, auto, yaml, ini, toml, advanced_host_list, constructed, community.general.consul_kv

[ssh_connection]
# WSL2 note: ControlPath uses POSIX paths (works in both WSL2 and Linux)
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=accept-new -o ServerAliveInterval=30 -o ServerAliveCountMax=3
pipelining = True
scp_if_ssh = False
control_path = %(directory)s/%%C

# WSL2: Use native Windows OpenSSH if available
# ssh_executable = /mnt/c/Windows/System32/OpenSSH/ssh.exe

[persistent_connection]
connect_timeout = 60
command_timeout = 120

[privilege_escalation]
become = False

[colors]
highlight = white
verbose = bright_blue
warn = bright_purple
error = red
ok = green
changed = yellow
skip = cyan
unreachable = bright_red

# ============================================
# WSL2-specific overrides
# ============================================
# If running inside WSL2, uncomment these for better performance:
#
# [ssh_connection]
# # Use Windows SSH agent (keys stored in Windows)
# ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=accept-new -o ServerAliveInterval=30 -o ServerAliveCountMax=3 -o IdentityAgent=/mnt/c/Users/%USERNAME%/.ssh/agent
#
# # Alternative: use npiperelay to access Windows OpenSSH Agent
# # ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=accept-new -o ServerAliveInterval=30 -o ServerAliveCountMax=3 -o IdentityAgent=\\.\pipe\openssh-ssh-agent
