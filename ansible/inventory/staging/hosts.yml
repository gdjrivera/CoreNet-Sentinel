---
all:
  children:
    fortigates:
      hosts:
        fgt-sandbox-lab:
          ansible_host: 192.168.100.10
          ansible_port: 22
          fgt_hostname: FGT-SANDBOX-LAB
          fgt_model: FortiGate-VM64
          fgt_serial: FGVM00ABCDE000012
          fgt_version: v7.4.3
          fgt_role: lab
          fgt_location: "Lab Internal - Testing"
          backup_method: ssh

        fgt-centro-sandbox:
          ansible_host: 10.150.200.10
          ansible_port: 22
          fgt_hostname: FGT-CENTRO-SANDBOX
          fgt_model: FortiGate-VM64
          fgt_serial: FGVM00ABCDE000013
          fgt_version: v7.4.1
          fgt_role: staging
          fgt_location: "Staging Centro - Pre-Prod"
          backup_method: api

      vars:
        ansible_user: "{{ vault_ansible_user }}"
        ansible_ssh_private_key_file: "{{ vault_ssh_key_path }}"
        ansible_network_os: fortinet.fortios.fortios
        ansible_connection: ansible.netcommon.network_cli
        backup_base_dir: "/tmp/backups/fortigates"
        backup_retention_days: 7
        git_repo_url: "git@gitlab.internal.local:infrastructure/fortigate-backups-staging.git"
        git_branch: "develop"
        notify_on_failure: true
        notify_on_success: false
        notify_on_change: false
